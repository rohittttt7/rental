version: '3.8'

services:
  # Main application service
  app:
    build: .
    container_name: rental-app
    ports:
      - "3000:3000"
      - "5000:5000"
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@db:5432/rental_db
      - MONGODB_URI=mongodb://mongo:27017/rental
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - mongo
      - redis
    networks:
      - rental-network
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: rental-postgres
    environment:
      - POSTGRES_DB=rental_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - rental-network
    restart: unless-stopped

  # MongoDB Database (alternative/additional)
  mongo:
    image: mongo:6.0
    container_name: rental-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=rental
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - rental-network
    restart: unless-stopped

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: rental-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rental-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: rental-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - rental-network
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  rental-network:
    driver: bridge